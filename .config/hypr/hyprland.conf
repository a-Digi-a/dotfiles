# Hyprland.conf

# -------------------------------------------
# Sources

source = ~/.config/hypr/input.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/visuals.conf
source = ~/.config/hypr/env_variables.conf
source = ~/.config/hypr/workspaces.conf

source = ~/.config/hypr/noctalia/noctalia-colors.conf
source = /home/digi/.config/hypr/noctalia/noctalia-colors.conf

# -------------------------------------------
# Monitors

monitor = eDP-1, 2256x1504@60, 0x0, 2
monitor = DP-1, 1920x1080@144, 0x0, 1
monitor = DP-2, 1920x1080@144, 1920x0, 1

# -------------------------------------------
# Autostart

exec-once = vesktop & spotify & zen-browser & QT_QPA_PLATFORMTHEME=gtk3 qs -c noctalia-shell & udiskie & hyprpm reload &

# -------------------------------------------
# Keybindings

source = ~/.config/hypr/global_binds.conf

# -------------------------------------------
# Layout
general {
    layout = dwindle
    # layout = scrolling
    # layout = master
    # layout = monocle
}

source = ~/.config/hypr/dwindle.conf
source = ~/.config/hypr/scrolling.conf
source = ~/.config/hypr/master.conf

# -------------------------------------------
# Misc

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
    middle_click_paste = false
}

# -------------------------------------------
