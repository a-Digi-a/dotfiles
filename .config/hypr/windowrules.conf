# Window Rules

windowrule {
    name = move-obs
    match:class = com.obsproject.Studio
    workspace = 6

}

windowrule {
    name = move-vesktop
    match:class = vesktop
    workspace = 3

}

windowrule {
    name = move-discord
    match:class = discord
    workspace = 3

}

windowrule {
    name = move-zen
    match:class = zen
    workspace = 4

}

windowrule {
    name = move-spotify
    match:class = spotify
    workspace = 5

}

# Example windowrules that are useful
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-unity-drags
    match:class = ^(Unity)$
    match:title = ^(UnityTooltipWindow)$
    no_focus = true
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
